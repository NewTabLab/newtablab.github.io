server {
    listen 80;
    server_name %{domain_name};
    rewrite ^ https://$http_host$request_uri? permanent;
}

server {
    listen 443 ssl;
    server_name %{domain_name} local-%{domain_name};
    root /home/deployer/sites/%{domain_name};
    
    index index.html;
    
    access_log /var/log/nginx/access_%{domain_name}_ssl.log;
    error_log /var/log/nginx/error_%{domain_name}_ssl.log;
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache assets
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public";
    }
    
    # disables .git folder :)
    location ~ /\.  { return 403; }
    
    # CSS and Javascript
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

}
